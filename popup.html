<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brink - Event Countdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressBar"></div>
    </div>

    <div class="container">
        <div class="toast" id="toast"></div>

        <!-- Form Section -->
        <div class="form-section" id="formSection">
            <div class="form-header">
                <h2 class="form-title">New Event</h2>
                <button class="close-btn" id="cancelBtn" type="button" aria-label="Cancel">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="1.5" y1="1.5" x2="8.5" y2="8.5"/><line x1="8.5" y1="1.5" x2="1.5" y2="8.5"/></svg>
                </button>
            </div>
            <form id="eventForm">
                <div class="form-group">
                    <label for="eventName">Event Name</label>
                    <input type="text" id="eventName" placeholder="e.g., Semester End Exams" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="eventDateTime">Date &amp; Time</label>
                    <input type="datetime-local" id="eventDateTime" required>
                </div>
                <div class="form-group">
                    <label>Color Tag</label>
                    <div class="color-picker" id="colorPicker">
                        <div class="color-dot active" data-color="#FFBF00" style="background:#FFBF00" title="Gold"></div>
                        <div class="color-dot" data-color="#6c63ff" style="background:#6c63ff" title="Purple"></div>
                        <div class="color-dot" data-color="#ff6b6b" style="background:#ff6b6b" title="Red"></div>
                        <div class="color-dot" data-color="#4ecdc4" style="background:#4ecdc4" title="Teal"></div>
                        <div class="color-dot" data-color="#45b7d1" style="background:#45b7d1" title="Blue"></div>
                        <div class="color-dot" data-color="#96ceb4" style="background:#96ceb4" title="Green"></div>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Add Event</button>
            </form>
        </div>

        <!-- Countdown Section -->
        <div class="countdown-section" id="countdownSection">
            <div class="event-header">
                <div class="event-meta">
                    <div class="event-title-row">
                        <h1 id="eventTitle"></h1>
                        <div class="urgency-badge" id="urgencyBadge"></div>
                    </div>
                    <div class="event-date" id="eventDate"></div>
                </div>
            </div>

            <div class="timesup" id="timesUp">
                <div class="timesup-icon">
                    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 3h8v5a4 4 0 0 1-8 0V3z"/>
                        <path d="M8 5.5H5.5A1.5 1.5 0 0 0 4 7v.5A2.5 2.5 0 0 0 6.5 10H8"/>
                        <path d="M16 5.5h2.5A1.5 1.5 0 0 1 20 7v.5a2.5 2.5 0 0 1-2.5 2.5H16"/>
                        <line x1="12" y1="12" x2="12" y2="17"/>
                        <line x1="9" y1="17" x2="15" y2="17"/>
                        <line x1="7" y1="21" x2="17" y2="21"/>
                    </svg>
                </div>
                <div class="timesup-text">Time's Up!</div>
                <div class="timesup-sub" id="timesUpSub"></div>
            </div>

            <div id="countdown">
                <div class="time-unit">
                    <div class="time-box">
                        <div class="time-value" id="days">00</div>
                        <div class="time-label">Days</div>
                    </div>
                </div>
                <div class="time-sep">:</div>
                <div class="time-unit">
                    <div class="time-box">
                        <div class="time-value" id="hours">00</div>
                        <div class="time-label">Hours</div>
                    </div>
                </div>
                <div class="time-sep">:</div>
                <div class="time-unit">
                    <div class="time-box">
                        <div class="time-value" id="minutes">00</div>
                        <div class="time-label">Minutes</div>
                    </div>
                </div>
                <div class="time-sep">:</div>
                <div class="time-unit">
                    <div class="time-box">
                        <div class="time-value" id="seconds">00</div>
                        <div class="time-label">Seconds</div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button id="addEventBtn" type="button" class="ctrl-btn">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
                    Add Event
                </button>
                <button id="manageBtn" type="button" class="ctrl-btn">
                    <svg width="14" height="11" viewBox="0 0 14 11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="0.5" y1="1" x2="13.5" y2="1"/><line x1="0.5" y1="5.5" x2="13.5" y2="5.5"/><line x1="0.5" y1="10" x2="13.5" y2="10"/></svg>
                    All Events
                </button>
                <button id="overlayToggleBtn" type="button" class="ctrl-btn">
                    <svg width="15" height="12" viewBox="0 0 15 12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="0.85" y="0.85" width="13.3" height="8.3" rx="1.5"/><line x1="5.5" y1="11.15" x2="9.5" y2="11.15"/><line x1="7.5" y1="9.15" x2="7.5" y2="11.15"/></svg>
                    <span id="overlayBtnLabel">Show on Page</span>
                </button>
            </div>
        </div>

        <!-- Events Management Section -->
        <div class="events-section" id="eventsSection">
            <div class="events-header">
                <h2>All Events</h2>
                <button class="close-btn" id="closeEventsBtn" type="button" aria-label="Close">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="1.5" y1="1.5" x2="8.5" y2="8.5"/><line x1="8.5" y1="1.5" x2="1.5" y2="8.5"/></svg>
                </button>
            </div>
            <div id="eventsContainer"></div>
            <button class="btn-add-from-list" id="addFromListBtn" type="button">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
                Add New Event
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
